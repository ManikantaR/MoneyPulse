# MoneyPulse — Docker Compose (Production)
# Usage: docker compose up -d
# With Ollama: docker compose --profile ai up -d

services:
  # ── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moneypulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-moneypulse}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ~/moneypulse-data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-moneypulse}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ~/moneypulse-data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme_redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moneypulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-moneypulse}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
      PORT: '4000'
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      PDF_PARSER_URL: ${PDF_PARSER_URL:-http://pdf-parser:5000}
      UPLOAD_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - ~/moneypulse-data/uploads:/data/uploads
      - ~/moneypulse-data/watch-folder:/config/watch-folder
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pdf-parser:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js Frontend ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api
    depends_on:
      api:
        condition: service_healthy

  # ── PDF Parser (Python) ─────────────────────────────────
  pdf-parser:
    build:
      context: .
      dockerfile: services/pdf-parser/Dockerfile
    restart: unless-stopped
    ports:
      - '127.0.0.1:5001:5000'
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama (Optional — use --profile ai) ────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ['ai']
    restart: unless-stopped
    ports:
      - '127.0.0.1:11434:11434'
    volumes:
      - ~/moneypulse-data/ollama:/root/.ollama

  # ── MCP Server ──────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    restart: unless-stopped
    ports:
      - '127.0.0.1:3100:3100'
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: ${POSTGRES_DB:-moneypulse}
      DB_USER: ${POSTGRES_USER:-moneypulse}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MCP_PORT: '3100'
    depends_on:
      postgres:
        condition: service_healthy

  # ── DB Backup ────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-moneypulse}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-moneypulse}
    volumes:
      - ~/moneypulse-data/backup:/backup
      - ./config/backup/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        chmod +x /usr/local/bin/backup.sh
        echo "0 2 * * * /usr/local/bin/backup.sh" | crontab -
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy

# All data is stored in ~/moneypulse-data/* bind mounts (outside the repo) — no named volumes needed.
